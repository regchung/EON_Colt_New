name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: 後端(相依 + 測試)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: smartcar
          POSTGRES_PASSWORD: smartcar_pw
          POSTGRES_DB: smartcar
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U smartcar -d smartcar"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://smartcar:smartcar_pw@localhost:5432/smartcar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: 安裝相依
        run: pip install -r backend/requirements.txt -r backend/requirements-dev.txt
      - name: 套用 migration
        working-directory: backend
        run: alembic upgrade head
      - name: 執行測試
        working-directory: backend
        run: pytest -q

  frontend:
    name: 前端(build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: 安裝相依
        working-directory: frontend
        run: npm install
      - name: 建置
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Docker 映像建置
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 準備 .env
        run: cp .env.example .env
      - name: 建置映像(backend + frontend)
        run: docker compose build backend frontend
