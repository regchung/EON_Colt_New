services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # 綁定主機資料夾(非 named volume):docker volume/system prune 不會刪除,防誤刪。
      - ./pgdata_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  osrm:
    image: ghcr.io/project-osrm/osrm-backend:latest
    command: osrm-routed --algorithm mld --max-table-size 10000 /data/taiwan-latest.osrm
    volumes:
      - ./osrm/data:/data
    ports:
      - "${OSRM_PORT:-5001}:5000"
    restart: unless-stopped
    # 需先執行前處理(make osrm-prepare)才會有索引檔。
    # 用 profile 讓預設 `docker compose up` 不啟動,前處理後再 `make osrm-up`。
    profiles: ["osrm"]

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      OSRM_URL: ${OSRM_URL:-http://osrm:5000}
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
